<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>Shramik Sathi App</title>
  <link rel="stylesheet" href="employee-app.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <main class="app-container">

    <!-- Top App Bar -->
    <header class="top-bar flex items-center justify-between px-4">
      <div class="flex items-center gap-3">
        <div class="avatar">
          <span>VS</span>
        </div>
        <div>
          <h1 class="font-semibold text-lg" style="margin-bottom: -4px;">Hello, Virat</h1>
          <span class="text-xs text-muted">ID: 15937</span>
        </div>
      </div>
      <div class="flex gap-2">
        <button class="icon-btn" aria-label="Change Language">
          <i data-lucide="languages"></i>
        </button>
        <button class="icon-btn" aria-label="Notifications">
          <i data-lucide="bell"></i>
        </button>
      </div>
    </header>

    <!-- Scrollable Content Area -->
    <div class="content-scroll">
      
      <!-- Core Action Banner (Job Hub) -->
      <section class="search-hub p-4">
        <h2 class="text-xl font-semibold mb-4">Find Verified Jobs</h2>
        
        <div class="search-input-wrapper mb-4">
          <i data-lucide="search" class="search-icon"></i>
          <input type="text" class="search-input" placeholder="Search for jobs (e.g. Fitter, Welder)">
          <button class="mic-btn touch-target" aria-label="Voice Search">
            <i data-lucide="mic"></i>
          </button>
        </div>

        <div class="flex gap-3">
          <button class="quick-action-btn rounded-lg touch-target">
            <i data-lucide="sliders-horizontal" style="width: 18px; height: 18px;"></i>
            Filters
          </button>
          <button class="quick-action-btn rounded-lg touch-target text-emerald" style="border-color: var(--emerald-600); background: var(--emerald-50);">
            <i data-lucide="file-up" style="width: 18px; height: 18px;"></i>
            Upload Profile
          </button>
        </div>
      </section>

      <!-- My Work & Money Grid -->
      <section class="p-4">
        <h3 class="font-semibold text-lg mb-4 text-muted">My Work & Money</h3>
        <div class="tools-grid">
          
          <button class="tool-card touch-target">
            <div class="tool-icon-wrapper bg-emerald-light">
              <i data-lucide="map-pin"></i>
            </div>
            <span class="text-xs font-medium">Mark<br>Attendance</span>
          </button>

          <button class="tool-card touch-target">
            <div class="tool-icon-wrapper bg-blue-light">
              <i data-lucide="calendar-days"></i>
            </div>
            <span class="text-xs font-medium">Apply<br>Leave</span>
          </button>

          <button class="tool-card touch-target">
            <div class="tool-icon-wrapper bg-amber-light">
              <i data-lucide="indian-rupee"></i>
            </div>
            <span class="text-xs font-medium">Advance<br>Salary</span>
          </button>

          <button class="tool-card touch-target">
            <div class="tool-icon-wrapper bg-blue-light">
              <i data-lucide="calculator"></i>
            </div>
            <span class="text-xs font-medium">Income<br>Calculator</span>
          </button>

          <button class="tool-card touch-target">
            <div class="tool-icon-wrapper bg-emerald-light">
              <i data-lucide="hard-hat"></i>
            </div>
            <span class="text-xs font-medium">Safety<br>Training</span>
          </button>

          <button class="tool-card touch-target">
            <div class="tool-icon-wrapper bg-amber-light">
              <i data-lucide="star"></i>
            </div>
            <span class="text-xs font-medium">Rate<br>Employer</span>
          </button>

        </div>
      </section>

      <!-- Trust Profile Section -->
      <section class="p-4 pt-0">
        <h3 class="font-semibold text-lg mb-4 text-muted">My Trust Profile</h3>
        <div class="trust-list">
          
          <div class="trust-card">
            <div class="trust-icon bg-emerald-light">
              <i data-lucide="check-circle-2"></i>
            </div>
            <div class="flex-1">
              <h4 class="font-semibold">UAN / PF Status</h4>
              <p class="text-xs text-muted">Verified & Active</p>
            </div>
          </div>

          <div class="trust-card">
            <div class="trust-icon bg-amber-light">
              <i data-lucide="clock"></i>
            </div>
            <div class="flex-1">
              <h4 class="font-semibold">ESIC Number</h4>
              <p class="text-xs text-muted">Pending Verification</p>
            </div>
          </div>

          <div class="trust-card">
            <div class="trust-icon bg-blue-light">
              <i data-lucide="shield-check"></i>
            </div>
            <div class="flex-1">
              <h4 class="font-semibold">Police Verification</h4>
              <p class="text-xs text-muted">Submitted (20/10/2024)</p>
            </div>
          </div>

        </div>
      </section>

    </div>

    <!-- Bottom Navigation Bar -->
    <nav class="bottom-nav">
      <a href="#" class="nav-item touch-target active">
        <i data-lucide="home"></i>
        <span class="text-xs font-medium">Home</span>
      </a>
      <a href="#" class="nav-item touch-target">
        <i data-lucide="briefcase"></i>
        <span class="text-xs font-medium">Jobs</span>
      </a>
      <a href="#" class="nav-item touch-target">
        <i data-lucide="newspaper"></i>
        <span class="text-xs font-medium">News</span>
      </a>
      <a href="#" class="nav-item touch-target">
        <i data-lucide="user"></i>
        <span class="text-xs font-medium">Profile</span>
      </a>
    </nav>

  </main>

  <script>
    // Initialize Lucide Icons
    lucide.createIcons();

    // Simple active state toggle for bottom nav
    document.querySelectorAll('.bottom-nav .nav-item').forEach(item => {
      item.addEventListener('click', (e) => {
        e.preventDefault();
        document.querySelectorAll('.bottom-nav .nav-item').forEach(nav => nav.classList.remove('active'));
        item.classList.add('active');
      });
    });
  </script>
</body>
</html>
