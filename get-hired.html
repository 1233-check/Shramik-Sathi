<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Employee Portal | Shramik Sathi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            emerald: { 50: '#ecfdf5', 100: '#d1fae5', 500: '#10b981', 600: '#059669', 700: '#047857' },
            blue: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb' },
            amber: { 50: '#fffbeb', 100: '#fef3c7', 500: '#f59e0b', 600: '#d97706' },
            gray: { 50: '#f9fafb', 100: '#f3f4f6', 200: '#e5e7eb', 800: '#1f2937', 900: '#111827' }
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #cbd5e1; /* slate-300 background for desktop to highlight the mobile app frame */ }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* Touch target enforcement */
    button, a { -webkit-tap-highlight-color: transparent; }
    .touch-target { min-height: 48px; min-width: 48px; }
  </style>
</head>
<body class="text-gray-900 antialiased font-sans flex justify-center">

  <!-- Mobile App Frame -->
  <main class="w-full max-w-md bg-gray-50 min-h-screen relative shadow-2xl flex flex-col overflow-hidden border-x border-gray-200">
    
    <!-- 1. Top App Bar (Sticky Header) -->
    <header class="sticky top-0 z-50 bg-white shadow-sm px-4 py-3 flex items-center justify-between touch-target">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold text-lg">
          VS
        </div>
        <div class="flex flex-col">
          <span class="font-semibold text-gray-900 leading-tight">Hello, Virat</span>
          <span class="text-xs text-gray-500 font-medium">ID: 15937</span>
        </div>
      </div>
      <div class="flex items-center gap-1">
        <button class="touch-target flex items-center justify-center text-gray-500 hover:text-gray-800 hover:bg-gray-100 rounded-full transition-colors active:bg-gray-200" aria-label="Language">
          <i data-lucide="languages" class="w-6 h-6"></i>
        </button>
        <button class="touch-target flex items-center justify-center text-gray-500 hover:text-gray-800 hover:bg-gray-100 rounded-full transition-colors active:bg-gray-200 relative" aria-label="Notifications">
          <i data-lucide="bell" class="w-6 h-6"></i>
          <span class="absolute top-2.5 right-2.5 w-2.5 h-2.5 bg-amber-500 rounded-full border-2 border-white"></span>
        </button>
      </div>
    </header>

    <!-- Scrollable Content -->
    <div class="flex-1 overflow-y-auto no-scrollbar pb-24">
      
      <!-- 2. Core Action Banner (The "Find Jobs" Hub) -->
      <section class="p-4 pt-6">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-5">
          <h2 class="text-[1.4rem] font-bold text-gray-900 mb-5 tracking-tight leading-tight">Find Verified Jobs</h2>
          
          <div class="relative flex items-center mb-5">
            <div class="absolute left-4 text-gray-400">
              <i data-lucide="search" class="w-5 h-5"></i>
            </div>
            <input type="text" placeholder="Search jobs (e.g. Fitter)" class="w-full bg-gray-50 border border-gray-200 rounded-xl py-3.5 pl-11 pr-14 text-[15px] font-medium outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all touch-target placeholder-gray-400">
            <button class="absolute right-2 text-blue-600 bg-blue-50 hover:bg-blue-100 rounded-lg touch-target flex items-center justify-center active:bg-blue-200 transition-colors" style="min-width: 40px; min-height: 40px;" aria-label="Voice Search">
              <i data-lucide="mic" class="w-5 h-5"></i>
            </button>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <button class="flex items-center justify-center gap-2 bg-white border border-gray-200 rounded-xl touch-target text-gray-700 font-semibold text-sm active:bg-gray-50 transition-colors">
              <i data-lucide="sliders-horizontal" class="w-4 h-4"></i>
              <span>Filters</span>
            </button>
            <button class="flex items-center justify-center gap-2 bg-emerald-600 border border-emerald-600 text-white rounded-xl touch-target font-semibold text-sm active:bg-emerald-700 transition-colors shadow-sm">
              <i data-lucide="file-up" class="w-4 h-4"></i>
              <span>Upload CV</span>
            </button>
          </div>
        </div>
      </section>

      <!-- 3. "My Work & Money" Grid -->
      <section class="px-4 py-2">
        <h3 class="text-[1.1rem] font-bold text-gray-800 mb-4 px-1">My Work & Money</h3>
        <div class="grid grid-cols-2 gap-3">
          
          <!-- Attendance (Green for Go/Action) -->
          <button class="bg-white p-4 rounded-2xl shadow-sm border border-gray-200 flex flex-col items-center justify-center gap-3 active:bg-gray-50 active:scale-[0.98] transition-all touch-target min-h-[115px]">
            <div class="w-[52px] h-[52px] rounded-full bg-emerald-50 text-emerald-600 flex items-center justify-center">
              <i data-lucide="map-pin" class="w-6 h-6"></i>
            </div>
            <span class="font-semibold text-gray-700 text-[13px] leading-tight text-center">Mark<br>Attendance</span>
          </button>

          <!-- Leave (Red/Amber for Stop/Pause) -->
          <button class="bg-white p-4 rounded-2xl shadow-sm border border-gray-200 flex flex-col items-center justify-center gap-3 active:bg-gray-50 active:scale-[0.98] transition-all touch-target min-h-[115px]">
            <div class="w-[52px] h-[52px] rounded-full bg-amber-50 text-amber-600 flex items-center justify-center">
              <i data-lucide="calendar" class="w-6 h-6"></i>
            </div>
            <span class="font-semibold text-gray-700 text-[13px] leading-tight text-center">Apply<br>Leave</span>
          </button>

          <!-- Salary (Green/Emerald for Money) -->
          <button class="bg-white p-4 rounded-2xl shadow-sm border border-gray-200 flex flex-col items-center justify-center gap-3 active:bg-gray-50 active:scale-[0.98] transition-all touch-target min-h-[115px]">
            <div class="w-[52px] h-[52px] rounded-full bg-emerald-50 text-emerald-600 flex items-center justify-center">
              <i data-lucide="indian-rupee" class="w-6 h-6"></i>
            </div>
            <span class="font-semibold text-gray-700 text-[13px] leading-tight text-center">Advance<br>Salary</span>
          </button>

          <!-- Calculator (Blue for Info/Tool) -->
          <button class="bg-white p-4 rounded-2xl shadow-sm border border-gray-200 flex flex-col items-center justify-center gap-3 active:bg-gray-50 active:scale-[0.98] transition-all touch-target min-h-[115px]">
            <div class="w-[52px] h-[52px] rounded-full bg-blue-50 text-blue-600 flex items-center justify-center">
              <i data-lucide="calculator" class="w-6 h-6"></i>
            </div>
            <span class="font-semibold text-gray-700 text-[13px] leading-tight text-center">Income<br>Calculator</span>
          </button>

          <!-- Safety (Blue for Info/Tool) -->
          <button class="bg-white p-4 rounded-2xl shadow-sm border border-gray-200 flex flex-col items-center justify-center gap-3 active:bg-gray-50 active:scale-[0.98] transition-all touch-target min-h-[115px]">
            <div class="w-[52px] h-[52px] rounded-full bg-blue-50 text-blue-600 flex items-center justify-center">
              <i data-lucide="hard-hat" class="w-6 h-6"></i>
            </div>
            <span class="font-semibold text-gray-700 text-[13px] leading-tight text-center">Safety<br>Training</span>
          </button>

          <!-- Rate (Amber for Rating) -->
          <button class="bg-white p-4 rounded-2xl shadow-sm border border-gray-200 flex flex-col items-center justify-center gap-3 active:bg-gray-50 active:scale-[0.98] transition-all touch-target min-h-[115px]">
            <div class="w-[52px] h-[52px] rounded-full bg-amber-50 text-amber-500 flex items-center justify-center">
              <i data-lucide="star" class="w-6 h-6"></i>
            </div>
            <span class="font-semibold text-gray-700 text-[13px] leading-tight text-center">Rate<br>Employer</span>
          </button>

        </div>
      </section>

      <!-- 4. "My Trust Profile" Section -->
      <section class="px-4 py-6">
        <h3 class="text-[1.1rem] font-bold text-gray-800 mb-4 px-1">My Trust Profile</h3>
        <div class="flex flex-col gap-3">
          
          <!-- UAN / PF -->
          <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-4 flex items-center gap-4">
            <div class="w-12 h-12 rounded-full bg-emerald-50 text-emerald-600 flex items-center justify-center flex-shrink-0">
              <i data-lucide="check-circle-2" class="w-6 h-6"></i>
            </div>
            <div class="flex-1">
              <h4 class="font-bold text-gray-900 text-[15px]">UAN (PF) Status</h4>
              <p class="text-emerald-600 text-sm font-semibold mt-0.5">Verified & Active</p>
            </div>
          </div>

          <!-- ESIC -->
          <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-4 flex items-center gap-4">
            <div class="w-12 h-12 rounded-full bg-amber-50 text-amber-600 flex items-center justify-center flex-shrink-0">
              <i data-lucide="clock" class="w-6 h-6"></i>
            </div>
            <div class="flex-1">
              <h4 class="font-bold text-gray-900 text-[15px]">ESIC Number</h4>
              <p class="text-amber-600 text-sm font-semibold mt-0.5">Pending Verification</p>
            </div>
          </div>

          <!-- Police Verification -->
          <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-4 flex items-center gap-4">
            <div class="w-12 h-12 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center flex-shrink-0">
              <i data-lucide="shield-check" class="w-6 h-6"></i>
            </div>
            <div class="flex-1">
              <h4 class="font-bold text-gray-900 text-[15px]">Police Verification</h4>
              <p class="text-blue-600 text-sm font-semibold mt-0.5">Submitted</p>
            </div>
          </div>

        </div>
      </section>
      
    </div>

    <!-- 5. Bottom Navigation Bar (Sticky Footer) -->
    <nav class="absolute bottom-0 w-full bg-white border-t border-gray-200 flex justify-between items-center pb-safe pt-2 px-2 z-50 h-[70px]">
      
      <a href="#" class="flex-1 flex flex-col items-center justify-center touch-target text-emerald-600 h-full">
        <i data-lucide="home" class="w-[22px] h-[22px] mb-1"></i>
        <span class="text-[11px] font-bold">Home</span>
      </a>
      
      <a href="#" class="flex-1 flex flex-col items-center justify-center touch-target text-gray-400 hover:text-gray-600 h-full active:bg-gray-50 rounded-xl transition-colors">
        <i data-lucide="briefcase" class="w-[22px] h-[22px] mb-1"></i>
        <span class="text-[11px] font-semibold">Jobs</span>
      </a>
      
      <a href="#" class="flex-1 flex flex-col items-center justify-center touch-target text-gray-400 hover:text-gray-600 h-full active:bg-gray-50 rounded-xl transition-colors">
        <i data-lucide="newspaper" class="w-[22px] h-[22px] mb-1"></i>
        <span class="text-[11px] font-semibold">News</span>
      </a>
      
      <a href="#" class="flex-1 flex flex-col items-center justify-center touch-target text-gray-400 hover:text-gray-600 h-full active:bg-gray-50 rounded-xl transition-colors">
        <i data-lucide="user" class="w-[22px] h-[22px] mb-1"></i>
        <span class="text-[11px] font-semibold">Profile</span>
      </a>

    </nav>
  </main>

  <script>
    // Initialize Lucide Icons
    lucide.createIcons();

    // Bottom Navigation Logic
    const navButtons = document.querySelectorAll('nav.absolute.bottom-0 a');
    
    navButtons.forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.preventDefault(); // Prevent default anchor jump
        
        // Remove active state from all buttons
        navButtons.forEach(nav => {
          nav.classList.remove('text-emerald-600');
          nav.classList.add('text-gray-400', 'hover:text-gray-600');
          nav.querySelector('span').classList.remove('font-bold');
          nav.querySelector('span').classList.add('font-semibold');
        });

        // Add active state to clicked button
        btn.classList.remove('text-gray-400', 'hover:text-gray-600');
        btn.classList.add('text-emerald-600');
        btn.querySelector('span').classList.remove('font-semibold');
        btn.querySelector('span').classList.add('font-bold');
      });
    });
  </script>
</body>
</html>
