<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Jobs | Shramik Sathi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            emerald: { 50: '#ecfdf5', 100: '#d1fae5', 500: '#10b981', 600: '#059669', 700: '#047857' },
            blue: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb' },
            amber: { 50: '#fffbeb', 100: '#fef3c7', 500: '#f59e0b', 600: '#d97706' },
            gray: { 50: '#f9fafb', 100: '#f3f4f6', 200: '#e5e7eb', 800: '#1f2937', 900: '#111827' }
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #cbd5e1; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    button, a { -webkit-tap-highlight-color: transparent; }
    .touch-target { min-height: 48px; min-width: 48px; }
  </style>
</head>
<body class="text-gray-900 antialiased font-sans flex justify-center">

  <main class="w-full max-w-md bg-gray-50 min-h-screen relative shadow-2xl flex flex-col overflow-hidden border-x border-gray-200">
    
    <!-- Header -->
    <header class="sticky top-0 z-50 bg-white shadow-sm px-4 py-3 flex items-center justify-between touch-target">
      <h1 class="font-bold text-xl text-gray-900 tracking-tight">Available Jobs</h1>
      <button class="touch-target flex items-center justify-center text-gray-500 hover:bg-gray-100 rounded-full active:bg-gray-200" aria-label="Filter Jobs">
        <i data-lucide="filter" class="w-6 h-6"></i>
      </button>
    </header>

    <!-- Scrollable Content -->
    <div class="flex-1 overflow-y-auto no-scrollbar pb-24 px-4 py-4 flex flex-col gap-4">
      
      <!-- Search Bar -->
      <div class="relative flex items-center bg-white rounded-xl shadow-sm border border-gray-200 p-1">
        <div class="pl-3 text-gray-400"><i data-lucide="search" class="w-5 h-5"></i></div>
        <input type="text" placeholder="Search Role or Location" class="w-full bg-transparent py-3 pl-3 pr-4 text-[15px] font-medium outline-none placeholder-gray-400">
      </div>

      <!-- Job Card 1 -->
      <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-5 active:bg-gray-50 transition-colors cursor-pointer touch-target">
        <div class="flex justify-between items-start mb-3">
          <div>
            <h2 class="text-[17px] font-bold text-gray-900 leading-tight">Mechanical Fitter</h2>
            <p class="text-sm text-gray-500 font-medium mt-1">Tata Steel Plant, Jamshedpur</p>
          </div>
          <span class="bg-emerald-50 text-emerald-600 text-xs font-bold px-2 py-1 rounded-md">Urgent</span>
        </div>
        
        <div class="flex items-center gap-4 mb-4">
          <div class="flex items-center gap-1.5 text-gray-600">
            <i data-lucide="indian-rupee" class="w-4 h-4 text-emerald-600"></i>
            <span class="text-sm font-semibold">₹650/day</span>
          </div>
          <div class="flex items-center gap-1.5 text-gray-600">
            <i data-lucide="briefcase" class="w-4 h-4 text-blue-600"></i>
            <span class="text-sm font-semibold">Skilled</span>
          </div>
        </div>

        <button class="w-full bg-emerald-600 text-white font-bold py-3.5 rounded-xl touch-target active:bg-emerald-700 transition-colors shadow-sm">
          Apply Now
        </button>
      </div>

      <!-- Job Card 2 -->
      <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-5 active:bg-gray-50 transition-colors cursor-pointer touch-target">
        <div class="flex justify-between items-start mb-3">
          <div>
            <h2 class="text-[17px] font-bold text-gray-900 leading-tight">General Helper</h2>
            <p class="text-sm text-gray-500 font-medium mt-1">L&T Construction, Bokaro</p>
          </div>
          <span class="bg-blue-50 text-blue-600 text-xs font-bold px-2 py-1 rounded-md">New</span>
        </div>
        
        <div class="flex items-center gap-4 mb-4">
          <div class="flex items-center gap-1.5 text-gray-600">
            <i data-lucide="indian-rupee" class="w-4 h-4 text-emerald-600"></i>
            <span class="text-sm font-semibold">₹450/day</span>
          </div>
          <div class="flex items-center gap-1.5 text-gray-600">
            <i data-lucide="briefcase" class="w-4 h-4 text-blue-600"></i>
            <span class="text-sm font-semibold">Unskilled</span>
          </div>
        </div>

        <button class="w-full bg-emerald-600 text-white font-bold py-3.5 rounded-xl touch-target active:bg-emerald-700 transition-colors shadow-sm">
          Apply Now
        </button>
      </div>

      <!-- Job Card 3 -->
      <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-5 active:bg-gray-50 transition-colors cursor-pointer touch-target">
        <div class="flex justify-between items-start mb-3">
          <div>
            <h2 class="text-[17px] font-bold text-gray-900 leading-tight">MIG Welder</h2>
            <p class="text-sm text-gray-500 font-medium mt-1">JSW Steel, Odisha</p>
          </div>
        </div>
        
        <div class="flex items-center gap-4 mb-4">
          <div class="flex items-center gap-1.5 text-gray-600">
            <i data-lucide="indian-rupee" class="w-4 h-4 text-emerald-600"></i>
            <span class="text-sm font-semibold">₹800/day</span>
          </div>
          <div class="flex items-center gap-1.5 text-gray-600">
            <i data-lucide="briefcase" class="w-4 h-4 text-blue-600"></i>
            <span class="text-sm font-semibold">Highly Skilled</span>
          </div>
        </div>

        <button class="w-full bg-gray-100 text-gray-500 font-bold py-3.5 rounded-xl touch-target" disabled>
          Positions Filled
        </button>
      </div>

    </div>

    <!-- Bottom Navigation Bar -->
    <nav class="absolute bottom-0 w-full bg-white border-t border-gray-200 flex justify-between items-center pb-safe pt-2 px-2 z-50 h-[70px]">
      <a href="get-hired.html" class="flex-1 flex flex-col items-center justify-center touch-target text-gray-400 hover:text-gray-600 h-full active:bg-gray-50 rounded-xl transition-colors">
        <i data-lucide="home" class="w-[22px] h-[22px] mb-1"></i>
        <span class="text-[11px] font-semibold">Home</span>
      </a>
      <a href="worker-jobs.html" class="flex-1 flex flex-col items-center justify-center touch-target text-emerald-600 h-full">
        <i data-lucide="briefcase" class="w-[22px] h-[22px] mb-1"></i>
        <span class="text-[11px] font-bold">Jobs</span>
      </a>
      <a href="worker-news.html" class="flex-1 flex flex-col items-center justify-center touch-target text-gray-400 hover:text-gray-600 h-full active:bg-gray-50 rounded-xl transition-colors">
        <i data-lucide="newspaper" class="w-[22px] h-[22px] mb-1"></i>
        <span class="text-[11px] font-semibold">News</span>
      </a>
      <a href="worker-profile.html" class="flex-1 flex flex-col items-center justify-center touch-target text-gray-400 hover:text-gray-600 h-full active:bg-gray-50 rounded-xl transition-colors">
        <i data-lucide="user" class="w-[22px] h-[22px] mb-1"></i>
        <span class="text-[11px] font-semibold">Profile</span>
      </a>
    </nav>
  </main>

  <script>lucide.createIcons();</script>
</body>
</html>
