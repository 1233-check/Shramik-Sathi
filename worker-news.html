<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5">
  <title>News & Updates | Shramik Sathi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="i18n.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            emerald: { 50: '#ecfdf5', 100: '#d1fae5', 500: '#10b981', 600: '#059669', 700: '#047857' },
            blue: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb' },
            amber: { 50: '#fffbeb', 100: '#fef3c7', 500: '#f59e0b', 600: '#d97706' },
            gray: { 50: '#f9fafb', 100: '#f3f4f6', 200: '#e5e7eb', 800: '#1f2937', 900: '#111827' }
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #cbd5e1; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    button, a { -webkit-tap-highlight-color: transparent; }
    .touch-target { min-height: 48px; min-width: 48px; }
  </style>
</head>
<body class="text-gray-900 antialiased font-sans flex justify-center">

  <main class="w-full max-w-md lg:max-w-5xl bg-gray-50 min-h-screen relative shadow-2xl lg:shadow-none flex flex-col overflow-hidden lg:overflow-visible border-x border-gray-200 lg:border-x-0">

    <!-- Header -->
    <header class="sticky top-0 z-50 bg-white shadow-sm px-4 py-3 lg:px-8">
      <div class="flex items-center justify-between gap-4 touch-target lg:max-w-5xl lg:mx-auto lg:w-full">
        <h1 data-i18n="news_title" class="font-bold text-xl text-gray-900 tracking-tight">Company News</h1>
        <nav class="hidden lg:flex items-center gap-1 mr-auto ml-6" aria-label="Primary">
          <a href="get-hired.html" data-i18n="nav_home" class="px-3 py-2 rounded-lg text-sm font-semibold text-gray-500 hover:text-gray-900 hover:bg-gray-100 transition-colors">Home</a>
          <a href="worker-jobs.html" data-i18n="nav_jobs" class="px-3 py-2 rounded-lg text-sm font-semibold text-gray-500 hover:text-gray-900 hover:bg-gray-100 transition-colors">Jobs</a>
          <a href="worker-news.html" data-i18n="nav_news" class="px-3 py-2 rounded-lg text-sm font-bold text-gray-900 bg-gray-100">News</a>
          <a href="worker-profile.html" data-i18n="nav_profile" class="px-3 py-2 rounded-lg text-sm font-semibold text-gray-500 hover:text-gray-900 hover:bg-gray-100 transition-colors">Profile</a>
        </nav>
        <button data-ss-lang-toggle class="h-9 min-w-9 px-2.5 mr-1 flex items-center justify-center text-[13px] font-bold text-gray-600 hover:text-gray-900 hover:bg-gray-100 rounded-full transition-colors" aria-label="Change language">हिं</button>
        <button class="touch-target flex items-center justify-center text-gray-500 hover:bg-gray-100 rounded-full active:bg-gray-200" aria-label="Settings">
          <i data-lucide="settings" class="w-6 h-6"></i>
        </button>
      </div>
    </header>

    <!-- Locked state — shown until an employer onboards the worker -->
    <div id="newsLocked" class="!hidden flex flex-1 flex-col items-center justify-center px-6 pb-28 lg:pb-12">
      <div class="w-full max-w-md bg-white rounded-2xl border border-gray-200 shadow-sm p-7 mt-6 text-center">
        <div class="w-16 h-16 mx-auto rounded-2xl bg-gray-100 text-gray-500 flex items-center justify-center mb-4">
          <i data-lucide="lock" class="w-8 h-8"></i>
        </div>
        <h2 data-i18n="news_locked_title" class="text-xl font-extrabold text-gray-900">News unlocks after onboarding</h2>
        <p data-i18n="news_locked_msg" class="text-sm text-gray-500 mt-2 leading-relaxed">Company news and updates appear once an employer hires you. Browse jobs and apply to get started.</p>
        <a href="worker-jobs.html" class="mt-6 w-full bg-gray-900 text-white font-bold py-3.5 rounded-xl flex items-center justify-center gap-2 active:bg-gray-700 transition-colors">
          <i data-lucide="search" class="w-5 h-5"></i> <span data-i18n="browse_jobs">Browse Jobs</span>
        </a>
      </div>
    </div>

    <!-- Scrollable Content -->
    <div id="newsContent" class="!hidden flex flex-1 overflow-y-auto no-scrollbar pb-24 px-4 py-6 flex-col gap-4 lg:overflow-visible lg:pb-12 lg:px-8 lg:max-w-5xl lg:mx-auto lg:w-full lg:grid lg:grid-cols-2 xl:grid-cols-3 lg:gap-5 lg:content-start">
      <!-- news cards rendered from company_news -->
    </div>

    <!-- Bottom Navigation Bar (mobile only) -->
    <nav class="absolute bottom-0 w-full bg-white border-t border-gray-200 flex justify-between items-center pb-safe pt-2 px-2 z-50 h-[70px] lg:hidden">
      <a href="get-hired.html" class="flex-1 flex flex-col items-center justify-center touch-target text-gray-400 hover:text-gray-600 h-full active:bg-gray-50 rounded-xl transition-colors">
        <i data-lucide="home" class="w-[22px] h-[22px] mb-1"></i>
        <span data-i18n="nav_home" class="text-[11px] font-semibold">Home</span>
      </a>
      <a href="worker-jobs.html" class="flex-1 flex flex-col items-center justify-center touch-target text-gray-400 hover:text-gray-600 h-full active:bg-gray-50 rounded-xl transition-colors">
        <i data-lucide="briefcase" class="w-[22px] h-[22px] mb-1"></i>
        <span data-i18n="nav_jobs" class="text-[11px] font-semibold">Jobs</span>
      </a>
      <a href="worker-news.html" class="flex-1 flex flex-col items-center justify-center touch-target text-emerald-600 h-full">
        <i data-lucide="newspaper" class="w-[22px] h-[22px] mb-1"></i>
        <span data-i18n="nav_news" class="text-[11px] font-bold">News</span>
      </a>
      <a href="worker-profile.html" class="flex-1 flex flex-col items-center justify-center touch-target text-gray-400 hover:text-gray-600 h-full active:bg-gray-50 rounded-xl transition-colors">
        <i data-lucide="user" class="w-[22px] h-[22px] mb-1"></i>
        <span data-i18n="nav_profile" class="text-[11px] font-semibold">Profile</span>
      </a>
    </nav>
  </main>

  <script>
    lucide.createIcons();
    // Onboarding gate: company news is visible only once an employer hires the worker
    (async () => {
      const sb = typeof getSupabaseClient === 'function' ? getSupabaseClient() : null;
      const content = document.getElementById('newsContent');
      const locked = document.getElementById('newsLocked');
      const reveal = (el) => { el.classList.remove('!hidden'); };  // base 'flex'/'lg:grid' classes then apply
      if (!sb) { reveal(content); return; }   // fail open — news isn't sensitive
      try {
        const { data: { session } } = await sb.auth.getSession();
        if (!session) { window.location.replace('worker-login.html'); return; }
        const { data: emp } = await sb.from('employees')
          .select('company_id').eq('auth_user_id', session.user.id).maybeSingle();
        if (!emp) { window.location.replace('worker-registration.html'); return; }
        if (emp.company_id) { reveal(content); loadNews(); }
        else { reveal(locked); }
      } catch (e) {
        console.error('news gate', e);
        reveal(content); loadNews();
      }
      if (window.lucide) lucide.createIcons();

      // ── Render live company news ──
      const NEWS_STYLE = {
        Payroll: { band: 'bg-blue-100',    icon: 'banknote',     ic: 'text-blue-500',    tag: 'text-blue-600' },
        Safety:  { band: 'bg-amber-100',   icon: 'shield-alert', ic: 'text-amber-500',   tag: 'text-amber-600' },
        Health:  { band: 'bg-emerald-100', icon: 'stethoscope',  ic: 'text-emerald-500', tag: 'text-emerald-600' },
        Policy:  { band: 'bg-purple-100',  icon: 'scroll-text',  ic: 'text-purple-500',  tag: 'text-purple-600' },
        General: { band: 'bg-slate-100',   icon: 'megaphone',    ic: 'text-slate-500',   tag: 'text-slate-600' },
      };
      function timeAgo(ts) {
        const s = (Date.now() - new Date(ts).getTime()) / 1000;
        if (s < 3600) return 'Just now';
        if (s < 86400) return Math.floor(s / 3600) + 'h ago';
        const d = Math.floor(s / 86400);
        return d === 1 ? 'Yesterday' : (d < 7 ? d + ' days ago' : Math.floor(d / 7) + 'w ago');
      }
      async function loadNews() {
        const esc = window.escapeHtml || (s => String(s == null ? '' : s));
        try {
          const { data, error } = await sb.from('company_news')
            .select('*').order('created_at', { ascending: false }).limit(30);
          if (error) { console.warn('[news]', error.message); return; }
          if (!data || !data.length) {
            content.innerHTML = '<div class="col-span-full text-center text-gray-400 py-12"><i data-lucide="newspaper" class="w-8 h-8 mx-auto mb-2"></i><p class="text-sm">No news yet. Check back soon.</p></div>';
            if (window.lucide) lucide.createIcons();
            return;
          }
          content.innerHTML = data.map(n => {
            const st = NEWS_STYLE[n.category] || NEWS_STYLE.General;
            return `<div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
              <div class="h-32 ${st.band} flex items-center justify-center">
                <i data-lucide="${st.icon}" class="w-12 h-12 ${st.ic} opacity-50"></i>
              </div>
              <div class="p-4">
                <div class="flex items-center gap-2 mb-2 text-xs font-semibold ${st.tag} uppercase tracking-wide">
                  <i data-lucide="alert-circle" class="w-3 h-3"></i> ${esc(n.category)}
                </div>
                <h2 class="text-[17px] font-bold text-gray-900 leading-tight mb-2">${esc(n.title)}</h2>
                ${n.body ? `<p class="text-sm text-gray-600">${esc(n.body)}</p>` : ''}
                <div class="mt-3 text-xs text-gray-400 font-medium">${timeAgo(n.created_at)}</div>
              </div>
            </div>`;
          }).join('');
          if (window.lucide) lucide.createIcons();
        } catch (e) { console.warn('[news] load failed', e); }
      }
    })();
  </script>
</body>
</html>
